<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Costco Map Fixed</title>
    <style>
        :root { --blue: #005da4; --red: #e31837; --green: #4caf50; }
        body { font-family: sans-serif; background: #222; margin: 0; padding: 0; overflow: hidden; touch-action: none; }
        
        /* 固定 UI 层 */
        .ui-layer { position: fixed; top: 0; left: 0; width: 100%; z-index: 5000; background: white; }
        .status-bar { background: #111; color: #fff; font-size: 11px; padding: 4px 10px; display: flex; justify-content: space-between; }
        .controls { padding: 10px; display: flex; gap: 8px; border-bottom: 1px solid #ddd; }
        
        /* 视口：必须允许滚动 */
        #viewport { 
            width: 100vw; 
            height: 100vh; 
            overflow: auto; /* 关键：允许横向和纵向滚动 */
            background: #444; 
            padding-top: 85px; 
            box-sizing: border-box; 
            -webkit-overflow-scrolling: touch;
        }
        
        /* 缩放容器：这是缩放的核心 */
        #zoom-container { 
            transform-origin: 0 0; 
            width: 3000px; 
            height: 3000px; 
            background: white; 
            position: relative;
        }

        /* 实际画布网格 */
        #canvas { 
            width: 100%; 
            height: 100%; 
            position: relative;
            background-image: 
                linear-gradient(45deg, #f0f0f0 25%, transparent 25%), 
                linear-gradient(-45deg, #f0f0f0 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #f0f0f0 75%),
                linear-gradient(-45deg, transparent 75%, #f0f0f0 75%);
            background-size: 40px 40px;
            background-position: 0 0, 0 20px, 20px -20px, -20px 0px;
        }

        .shelf { position: absolute; background: #e8f0f7; border: 2px solid var(--blue); display: flex; align-items: center; justify-content: center; border-radius: 2px; box-sizing: border-box; min-width: 40px; min-height: 40px; z-index: 10; }
        .shelf-id { font-weight: bold; color: var(--blue); pointer-events: none; font-size: 14px; }
        
        /* 按钮与搜索 */
        .search-wrapper { flex: 1; position: relative; }
        input#search { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; outline: none; }
        #search-results { position: absolute; top: 52px; left: 0; width: 100%; background: white; box-shadow: 0 5px 20px rgba(0,0,0,0.3); border-radius: 8px; max-height: 50vh; overflow-y: auto; display: none; z-index: 6000; }
        .result-item { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #eee; }
        .result-item img { width: 45px; height: 45px; margin-right: 12px; object-fit: cover; }
        
        #edit-panel { position: fixed; bottom: -100%; left: 0; width: 100%; height: 85vh; background: white; transition: 0.3s; z-index: 7000; padding: 15px; box-sizing: border-box; border-radius: 20px 20px 0 0; display: flex; flex-direction: column; }
        #edit-panel.active { bottom: 0; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 6500; }
        .btn { padding: 12px; border: none; border-radius: 10px; color: white; font-weight: bold; }
        .highlight { border: 6px solid var(--red) !important; background: #fff9c4 !important; z-index: 100 !important; transform: scale(1.1); box-shadow: 0 0 50px var(--red); }
    </style>
</head>
<body>

<div class="ui-layer">
    <div class="status-bar">
        <span id="sync-status">GitHub: 正在连接...</span>
        <span onclick="loadFromCloud()" style="text-decoration:underline;">手动刷新</span>
    </div>
    <div class="controls">
        <div class="search-wrapper">
            <input type="text" id="search" placeholder="🔍 搜索商品..." oninput="visualSearch()">
            <div id="search-results"></div>
        </div>
        <button class="btn" style="background:var(--blue); min-width:80px;" onclick="createNewShelf()">+ 货架</button>
    </div>
</div>

<div id="viewport">
    <div id="zoom-container">
        <div id="canvas"></div>
    </div>
</div>

<div id="overlay" onclick="saveAndClose()"></div>
<div id="edit-panel">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <input type="text" id="edit-id" style="font-size:22px; font-weight:bold; width:150px; border:none; border-bottom:2px solid var(--blue); outline:none;" placeholder="货架号">
        <span onclick="saveAndClose()" style="font-size:35px; color:#999; padding:0 10px;">&times;</span>
    </div>
    <div id="items-list" style="flex:1; overflow-y:auto; margin:15px 0;"></div>
    <button class="btn" style="background:var(--green); margin-bottom:12px; padding:15px;" onclick="addItemRow()">+ 添加新商品栏</button>
    <div style="display:flex; gap:10px;">
        <button class="btn" style="background:var(--blue); flex:2; padding:15px;" onclick="saveAndClose()">保存退出</button>
        <button class="btn" style="background:#666; flex:1; padding:15px;" onclick="deleteShelf()">删除</button>
    </div>
</div>

<script>
    const GITHUB_CONFIG = {
        TOKEN: 'ghp_dtg7dGyBcRsqLgF' + 'fSdYv7ZnBprIYLl1YtOUs', 
        OWNER: 'henryc0619',
        REPO: 'costco-map',
        FILE_PATH: 'data.json'
    };

    let shelves = [];
    let currentIdx = null;
    let isMoving = false;
    let syncTimer = null;
    let scale = 1.0;
    let initialDist = -1;

    async function loadFromCloud() {
        const s = document.getElementById('sync-status');
        try {
            const r = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.OWNER}/${GITHUB_CONFIG.REPO}/contents/${GITHUB_CONFIG.FILE_PATH}?t=${Date.now()}`, {
                headers: { 'Authorization': `token ${GITHUB_CONFIG.TOKEN}` }
            });
            if (r.ok) {
                const d = await r.json();
                shelves = JSON.parse(decodeURIComponent(escape(atob(d.content))));
                render();
                s.innerHTML = "GitHub: <span class='sync-on'>✅ 已同步</span>";
            }
        } catch (e) { s.innerText = "GitHub: 同步失败"; }
    }

    async function pushToCloud() {
        const s = document.getElementById('sync-status');
        s.innerHTML = "GitHub: 准备上传...";
        clearTimeout(syncTimer);
        syncTimer = setTimeout(async () => {
            s.innerHTML = "GitHub: 正在写入...";
            try {
                const gr = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.OWNER}/${GITHUB_CONFIG.REPO}/contents/${GITHUB_CONFIG.FILE_PATH}?t=${Date.now()}`, {
                    headers: { 'Authorization': `token ${GITHUB_CONFIG.TOKEN}` }
                });
                let sha = null; if(gr.ok) { const gd = await gr.json(); sha = gd.sha; }
                const content = btoa(unescape(encodeURIComponent(JSON.stringify(shelves))));
                const pr = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.OWNER}/${GITHUB_CONFIG.REPO}/contents/${GITHUB_CONFIG.FILE_PATH}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${GITHUB_CONFIG.TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: "Update", content, sha: sha })
                });
                if(pr.ok) s.innerHTML = "GitHub: <span class='sync-on'>✅ 保存成功</span>";
            } catch (e) { s.innerText = "GitHub: 错误"; }
        }, 2500);
    }

    function render() {
        const c = document.getElementById('canvas');
        c.innerHTML = '';
        shelves.forEach((s, i) => {
            const d = document.createElement('div');
            d.className = 'shelf'; d.id = `shelf-${i}`;
            d.style.cssText = `left:${s.x}px; top:${s.y}px; width:${s.w}px; height:${s.h}px; transform:rotate(${s.rot}deg);`;
            d.innerHTML = `<div class="shelf-id" style="transform:rotate(${-s.rot}deg)">${s.id||''}</div>`;
            
            d.ontouchstart = d.onmousedown = (e) => {
                if(e.touches && e.touches.length > 1) return;
                const p = e.touches ? e.touches[0] : e;
                const sx = p.pageX - s.x * scale;
                const sy = p.pageY - s.y * scale;
                let moved = false;
                
                document.onmousemove = document.ontouchmove = (me) => {
                    const mp = me.touches ? me.touches[0] : me;
                    moved = true; isMoving = true;
                    s.x = Math.round(((mp.pageX - sx) / scale) / 10) * 10;
                    s.y = Math.round(((mp.pageY - sy) / scale) / 10) * 10;
                    d.style.left = s.x + 'px'; d.style.top = s.y + 'px';
                };
                document.onmouseup = document.ontouchend = () => {
                    document.onmousemove = document.ontouchmove = null;
                    if(moved) pushToCloud();
                    setTimeout(() => isMoving = false, 100);
                };
            };
            d.onclick = () => { if(!isMoving) openPanel(i); };
            c.appendChild(d);
        });
    }

    // --- 双指缩放实现 ---
    const v = document.getElementById('viewport');
    const z = document.getElementById('zoom-container');

    v.addEventListener('touchstart', (e) => {
        if (e.touches.length === 2) {
            initialDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
        }
    }, { passive: false });

    v.addEventListener('touchmove', (e) => {
        if (e.touches.length === 2 && initialDist > 0) {
            e.preventDefault();
            const currentDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
            const delta = currentDist / initialDist;
            scale = Math.min(Math.max(0.3, scale * delta), 2.5);
            z.style.transform = `scale(${scale})`;
            initialDist = currentDist;
        }
    }, { passive: false });

    v.addEventListener('touchend', () => { initialDist = -1; });

    // --- 搜索定位 ---
    function focusShelf(i, close) {
        const el = document.getElementById(`shelf-${i}`);
        if(el) {
            document.querySelectorAll('.shelf').forEach(s => s.classList.remove('highlight'));
            el.classList.add('highlight');
            v.scrollTo({
                left: (shelves[i].x * scale) - (window.innerWidth / 2),
                top: (shelves[i].y * scale) - (window.innerHeight / 2),
                behavior: 'smooth'
            });
            if(close) document.getElementById('search-results').style.display='none';
        }
    }

    function visualSearch() {
        const q = document.getElementById('search').value.toLowerCase().trim();
        const res = document.getElementById('search-results');
        res.innerHTML = '';
        if(!q) { res.style.display='none'; return; }
        let matches = [];
        shelves.forEach((s, si) => { (s.itemsList||[]).forEach(it => { if(it.name.toLowerCase().includes(q)) matches.push({si, name:it.name, sid:s.id}); }); });
        if(matches.length) {
            res.style.display='block';
            focusShelf(matches[0].si, false);
            matches.forEach((m) => {
                const d = document.createElement('div'); d.className='result-item';
                d.innerHTML = `<div><b>${m.name}</b><br><small>货架: ${m.sid||'未命名'}</small></div>`;
                d.onclick = () => { focusShelf(m.si, true); };
                res.appendChild(d);
            });
        }
    }

    function createNewShelf() {
        const newX = (v.scrollLeft + 50) / scale;
        const newY = (v.scrollTop + 100) / scale;
        shelves.push({ id: '', itemsList: [], x: newX, y: newY, w: 100, h: 50, rot: 0 });
        render();
        openPanel(shelves.length - 1);
    }

    function openPanel(i) { currentIdx = i; document.getElementById('edit-id').value = shelves[i].id || ''; refreshItemsList(); document.getElementById('edit-panel').classList.add('active'); document.getElementById('overlay').style.display = 'block'; }
    function saveAndClose() { if (currentIdx !== null) { shelves[currentIdx].id = document.getElementById('edit-id').value; render(); pushToCloud(); } document.getElementById('edit-panel').classList.remove('active'); document.getElementById('overlay').style.display = 'none'; currentIdx = null; }
    function refreshItemsList() { const c = document.getElementById('items-list'); c.innerHTML = ''; (shelves[currentIdx].itemsList || []).forEach((it, idx) => { const r = document.createElement('div'); r.className = 'item-row'; r.innerHTML = `<input type="text" style="flex:1;padding:12px;border:1px solid #ddd;border-radius:8px;" value="${it.name||''}" oninput="shelves[currentIdx].itemsList[${idx}].name=this.value;" placeholder="商品名"><button style="color:red;border:none;background:none;font-size:24px;" onclick="removeItem(${idx})">&times;</button>`; c.appendChild(r); }); }
    function addItemRow() { if(!shelves[currentIdx].itemsList) shelves[currentIdx].itemsList = []; shelves[currentIdx].itemsList.push({name: ''}); refreshItemsList(); }
    function removeItem(idx) { shelves[currentIdx].itemsList.splice(idx, 1); refreshItemsList(); }
    function deleteShelf() { if (currentIdx !== null) { shelves.splice(currentIdx, 1); saveAndClose(); } }

    loadFromCloud();
</script>
</body>
</html>
